firm:
  name: Your Company
  slug: your-slug

integrations:
  doc_store:  notion       # notion | confluence | google_docs
  ticket:     linear       # linear | jira | github_issues
  code_host:  github       # github | gitlab

  notion:
    workspace_id: ""
    default_parent_page: "Engineering/TDDs"

  linear:
    team_id: ""
    default_labels: ["forge"]

  github:
    org: your-org
    default_reviewers: []
    base_branch: main

build:
  build_command: ""
  test_command:  ""
  coverage_threshold: 80

security:
  sast_tool: semgrep       # semgrep | snyk | none

engineer:
  name:          "Your Name"
  github_handle: "@yourhandle"

tdd:
  max_critic_iterations: 5
  additional_sections: []
