set -g default-terminal "screen-256color"
set -as terminal-features ",xterm-256color:RGB"
set-option -g history-limit 10000
set-option -g renumber-windows on
set-window-option -g pane-base-index 1

# Start window numbering at 1
set-option -g base-index 1

set -g status-keys vi
setw -g mode-keys vi

# split panes using v and s
bind-key v split-window -h
bind-key s split-window -v

bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# remap prefix to Control + a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

unbind '"'
unbind %

# Cycle panes with C-b C-b
unbind ^B
bind ^B select-pane -t :.+

# Reload config
bind-key r source-file ~/.tmux.conf \; display "Config reloaded!"

# don't rename windows automatically
set-option -g allow-rename off
set-window-option -g automatic-rename off
set-option -g set-titles on

# Allow for Ctrl-a Ctrl-a
bind a send-prefix

# Remove esc delay for vim
set -sg escape-time 0

# Scrolling
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Clear pane and history
bind -n C-k send-keys C-l \; clear-history

# Smart pane switching with vim awareness
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"
bind C-l send-keys 'C-l'

# Copy mode
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle

# в”Ђв”Ђв”Ђ Catppuccin Mocha palette в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
thm_base="#1e1e2e"
thm_mantle="#181825"
thm_surface="#313244"
thm_overlay="#45475a"
thm_subtext="#a6adc8"
thm_text="#cdd6f4"
thm_lavender="#b4befe"
thm_blue="#89b4fa"
thm_green="#a6e3a1"
thm_peach="#fab387"
thm_mauve="#cba6f7"

# в”Ђв”Ђв”Ђ Status bar в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g status on
set -g status-position top
set -g status-interval 1
set -g status-justify left

set -g status-style "bg=$thm_mantle,fg=$thm_subtext"

# Left: session name with powerline chevron
set -g status-left-length 40
set -g status-left "#[fg=$thm_mantle,bg=$thm_lavender,bold] #S #[fg=$thm_lavender,bg=$thm_mantle,nobold,nounderscore,noitalics]"

# Right: date/time
set -g status-right-length 60
set -g status-right "#[fg=$thm_surface,bg=$thm_mantle]#[fg=$thm_subtext,bg=$thm_surface] %a %H:%M #[fg=$thm_lavender,bg=$thm_surface]#[fg=$thm_mantle,bg=$thm_lavender,bold]  #{host_short} "

# в”Ђв”Ђв”Ђ Window tabs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g window-status-separator ""

# Inactive windows
set -g window-status-format "#[fg=$thm_mantle,bg=$thm_surface]#[fg=$thm_subtext,bg=$thm_surface] #I  #W #[fg=$thm_surface,bg=$thm_mantle]"

# Active window
set -g window-status-current-format "#[fg=$thm_mantle,bg=$thm_blue]#[fg=$thm_mantle,bg=$thm_blue,bold] #I  #W #[fg=$thm_blue,bg=$thm_mantle,nobold]"

# в”Ђв”Ђв”Ђ Pane borders в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g pane-border-style "fg=$thm_surface"
set -g pane-active-border-style "fg=$thm_lavender"

# в”Ђв”Ђв”Ђ Messages в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g message-style "fg=$thm_text,bg=$thm_surface,bold"
set -g message-command-style "fg=$thm_text,bg=$thm_surface"

# в”Ђв”Ђв”Ђ Copy mode в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g mode-style "fg=$thm_mantle,bg=$thm_lavender"

# в”Ђв”Ђв”Ђ Plugins в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Ensure TPM is installed: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tmux-yank'

# Keep this at the very bottom, always
run '~/.tmux/plugins/tpm/tpm'

bind-key "K" display-popup -E -w 40% "sesh connect \"$(sesh list -i | gum filter --limit 1 --no-sort --fuzzy --placeholder 'Pick a sesh' --height 50 --prompt='вљЎ')\""
