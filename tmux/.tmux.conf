set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set-option -g history-limit 10000
set-option -g renumber-windows on
set-window-option -g pane-base-index 1

# Start window numbering at 1
set-option -g base-index 1

set -g status-keys vi
setw -g mode-keys vi

# split panes using v and s
bind-key v split-window -h
bind-key s split-window -v

bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# remap prefix to Control + a
set -g prefix C-a
unbind C-b
bind C-a send-prefix

unbind '"'
unbind %

# Cycle panes with C-b C-b
unbind ^B
bind ^B select-pane -t :.+

# Reload config
bind-key r source-file ~/.tmux.conf \; display "Config reloaded!"

# don't rename windows automatically
set-option -g allow-rename off
set-window-option -g automatic-rename off
set-option -g set-titles on

# Allow for Ctrl-a Ctrl-a
bind a send-prefix

# Remove esc delay for vim
set -sg escape-time 0

# Scrolling
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# Swap panes by direction (prefix + h/j/k/l)
bind -r h swap-pane -s '{left-of}'
bind -r j swap-pane -s '{down-of}'
bind -r k swap-pane -s '{up-of}'
bind -r l swap-pane -s '{right-of}'

# Resize panes (prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# Equalize pane sizes
bind = select-layout -E
bind | select-layout even-horizontal
bind - select-layout even-vertical

# Smart pane switching with vim awareness
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"
bind C-l send-keys 'C-l'

# Copy mode
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle

# ─── Plugins ────────────────────────────────────────────────────────────────
# Ensure TPM is installed: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'hiroppy/tmux-agent-sidebar'

set -g status-position top

set -g @catppuccin_flavor "frappe"

# Dim inactive panes, highlight active with accent border
set -g window-style 'bg=#1e1e2e'
set -g window-active-style 'bg=#24273a'
set -g pane-border-style 'fg=#494d64'
set -g pane-active-border-style 'fg=#c6a0f6'
set -g @catppuccin_window_status_style "rounded"
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}#{E:@catppuccin_status_session}#{E:@catppuccin_status_uptime}"

# ─── Sesh ──────────────────────────────────────────────────────────────
bind-key "o" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
bind-key x kill-pane # skip "kill-pane 1? (y/n)" prompt
set -g detach-on-destroy off  # don't exit from tmux when closing a session

# Keep this at the very bottom, always
run '~/.tmux/plugins/tpm/tpm'
